<html>
<head>

<div class="logoLinkHeader">
    <div class="companyLogo">
        <img src="chronioslogo.png">
    </div>
    <h1 class="companyName">Chronios Vale</h1>
    <br>
    <a href="Home.html" class="headerLink">Home</a>
    <a href="About.html" class="headerLink">About Us</a>

<body>

<h1>Welcome Employee</h1>
<p>Here at Chronios Vale we love having employees, if you're interested in our job openings,
    click here. (make link to page where it says no opening)</p>

<!--login form -->
<form onsubmit="return checkLogin()">

  <div class="container">
    <label for="uname"><b>Username</b></label>
    <input type="text" id="uname" placeholder="Enter Username" required>

    <label for="psw"><b>Password</b></label>
    <input type="password" id="psw" placeholder="Enter Password" required>

    <button type="submit">Login</button>
  </div>

</form>

<!-- send users to employee page if they use correct credentials-->
<script>
function checkLogin() {
  var username = document.getElementById("uname").value;
  var password = document.getElementById("psw").value;

  if (username === "JaneSmith" && password === "apple") {
    window.location.href = "employeeAccess.html";
    return false;
  } else {
    alert("Invalid login credentials");
    return false;
  }
}
</script>

</body>
</html>
