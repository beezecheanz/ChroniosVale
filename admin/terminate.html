<html>
    <head>
        <link rel="stylesheet" href="adminstylesheet.css">
    </head>
<body>
<div id="terminal" style="display:none">
    <h1>EMERGENCY TERMINATION PROTOCOL</h1>
    <P>Make sure that there is no other course of action before committing to this,
    there is no way to undo termination.</P>
    <div class="progressContainer">
        <div id="progressBar"></div>
    </div>
    <button id="holdButton">HOLD TO TERMINATE</button>
</div>

<form onsubmit="return checkLogin()" id="keyform">
  <div class="container">
    <p>To proceed further with this action, please input a termination key.</p>
    <label for="uname"><b>Termination Key</b></label>
    <input type="text" id="termkey" placeholder="Enter Key" required>
    <button type="submit">Submit</button>
  </div>
</form>
</body>
</html>

<script>
const button = document.getElementById("holdButton");
const bar = document.getElementById("progressBar");
let progress = 0;
let interval = null;

button.addEventListener("mousedown", () => {
    interval = setInterval(() => {
        progress += 1; //speed of bar filling 

        if (progress >= 100) {
            progress = 100;
            clearInterval(interval);
            window.location.href = "terminateComplete.html";
        }
        bar.style.width = progress + "%";
    }, 50);
});

button.addEventListener("mouseup", () => {
    clearInterval(interval);
    progress = 0;
    bar.style.width = progress + "%";
});

button.addEventListener("mouseleave", () => {
    clearInterval(interval);
    progress = 0;
    bar.style.width = progress + "%";
});

function checkLogin() {
  var username = document.getElementById("termkey").value;
  let usernameInput = username.toLowerCase().replace(/\s+/g, "");
  if (usernameInput === "daughter") {
    var F = document.getElementById("keyform");
    var T = document.getElementById("terminal"),
    displayValue = "";
    if (T.style.display == "")
        displayValue = "none";
    T.style.display = displayValue;
    F.style.display = "none";
    return false;
  } else {
    alert("INCORRECT KEY");
    return false;
  }
}

</script>
