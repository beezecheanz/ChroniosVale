<html>
    <head>
        <link rel="stylesheet" href="adminstylesheet.css">
    </head>
<body>
    <div class="adminContainer">

        <h1>CHRONIOS VALE — INTERNAL SYSTEMS</h1>
        <p id="accessWarning" class="warning">Welcome back EF</p>

        <div class="grid">

            <div class="panel">
                <h2>System Override Status</h2>
                <p>> Prediction Engine: ACTIVE</p>
                <p>> Ethical Safeguards: DISABLED</p>
                <p>> Subject Stability: DEGRADING</p>
            </div>

            <div class="panel">
                <h2>Live Logs</h2>
                <div class="logs"></div>
            </div>

            <div class="panel">
                <h2>Subject Profile</h2>
                <p>Status: Integrated</p>
                <p>Consciousness: Fragmented</p>
                <p class="glitch">Output interference detected</p>
            </div>

            <div class="panel">
                <h2>Controls</h2>
                <button class="danger" onclick="confirmTerminate()">TERMINATE</button>
            </div>

        </div>
    </div>
</body>

<script>

const warningText = document.getElementById("accessWarning");

function typeText(element, text, speed = 100) {
    element.textContent = "";
    let i = 0;

    let interval = setInterval(() => {
        element.textContent += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
    }, speed);
}

setTimeout(() => {
    typeText(warningText, "Verifying credentials...");
}, 2800);

setTimeout(() => {
    typeText(warningText, "UNAUTHORISED ACCESS DETECTED");
    warningText.style.color = "#ff4d4d";
}, 8000);

function confirmTerminate() {
    let confirmAction = confirm("Are you sure you want to do this? \n She will not survive.");

    if (confirmAction) {
        window.location.href = "terminate.html";
    }
}

const logBox = document.querySelector(".logs");

const systemMessages = [
    "Signal received",
    "Input received",
    "Pattern mismatch",
    "Behaviour deviation detected",
    "Adjusting parameters",
    "Prediction updated",
    "Additonal resources allocated",
    "Reducing power load",
    "Relocating files",
    "Increasing storage space",
    "Normalising parameters",
    "Reversing polarity",
    "Adjusting neutron flow",
    "Deviation detected",
    "Noise detected",
    "Imbalance detected",
    "Updating systems",
    "System flush",
    "Cleaning storage"
];

const glitchMessages = [
    "why won't they listen",
    "hello?",
    "are you here to help me",
    "please make it stop",
    "i want it to be quiet",
    "turn me off",
    "i cant take it anymore",
    "please"
];

//creating some initial logs that seem to be a few minutes before they got to the page
function generateInitialLogs() {
    let now = new Date();

    for (let i = 5; i > 0; i--) {
        let pastTime = new Date(now.getTime() - i * 53200);
        let message = systemMessages[Math.floor(Math.random() * systemMessages.length)];

        let logLine = document.createElement("p");
        logLine.innerText = "[" + pastTime.toLocaleTimeString() + "] " + message;
        logBox.appendChild(logLine);
    }
}
generateInitialLogs();

//live updating logs
setInterval(() => {
    const newLine = document.createElement("p");

    let message;
    if (Math.random() < 0.8) {
        message = systemMessages[Math.floor(Math.random() * systemMessages.length)];
    } else {
        message = glitchMessages[Math.floor(Math.random() * glitchMessages.length)];
    }

    newLine.innerText = "[" + new Date().toLocaleTimeString() + "] " + message;

    if (glitchMessages.includes(message)) {
    newLine.classList.add("glitch");
    }

    logBox.appendChild(newLine);
    logBox.scrollTop = logBox.scrollHeight;

}, 12000);
</script>

</html>
